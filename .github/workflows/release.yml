name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Build on all platforms
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-22.04
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'EzProfile v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false

      # Generate & upload latest.json for auto-updater
      - name: Upload latest.json (Linux only)
        if: matrix.platform == 'linux'
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"  # strip 'v' prefix
          echo "Generating latest.json for version $VERSION"

          # Check if Tauri already generated it
          JSON_FILE="src-tauri/target/release/bundle/latest.json"
          if [ ! -f "$JSON_FILE" ]; then
            mkdir -p src-tauri/target/release/bundle
            REPO="${{ github.repository }}"
            TAG="${{ github.ref_name }}"
            PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            jq -n \
              --arg version "$VERSION" \
              --arg pub_date "$PUB_DATE" \
              --arg repo "$REPO" \
              --arg tag "$TAG" \
              '{
                version: $version,
                notes: "See the assets to download this version and install.",
                pub_date: $pub_date,
                platforms: {
                  "linux-x86_64": {signature: "", url: ("https://github.com/\($repo)/releases/download/\($tag)/EzProfile_\($version)_amd64.deb")},
                  "linux-x86_64-rpm": {signature: "", url: ("https://github.com/\($repo)/releases/download/\($tag)/EzProfile-\($version)-1.x86_64.rpm")},
                  "windows-x86_64": {signature: "", url: ("https://github.com/\($repo)/releases/download/\($tag)/EzProfile_\($version)_x64_en-US.msi")},
                  "darwin-x86_64": {signature: "", url: ("https://github.com/\($repo)/releases/download/\($tag)/EzProfile_\($version)_x64.dmg")},
                  "darwin-aarch64": {signature: "", url: ("https://github.com/\($repo)/releases/download/\($tag)/EzProfile_\($version)_aarch64.dmg")}
                }
              }' > "$JSON_FILE"
          fi
          echo "Uploading latest.json..."
          gh release upload "${{ github.ref_name }}" "$JSON_FILE" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
