name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Build on all platforms
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-22.04
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'EzProfile v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false

      # Generate & upload latest.json for auto-updater
      - name: Upload latest.json (Linux only)
        if: matrix.platform == 'linux'
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"  # strip 'v' prefix
          echo "Generating latest.json for version $VERSION"

          # Check if Tauri already generated it
          JSON_FILE="src-tauri/target/release/bundle/latest.json"
          if [ ! -f "$JSON_FILE" ]; then
            mkdir -p src-tauri/target/release/bundle
            python3 -c "
import json, os, datetime
v = '$VERSION'
repo = '${{ github.repository }}'
tag = '${{ github.ref_name }}'
data = {
    'version': v,
    'notes': 'See the assets to download this version and install.',
    'pub_date': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
    'platforms': {
        'linux-x86_64': {'signature': '', 'url': f'https://github.com/{repo}/releases/download/{tag}/EzProfile_{v}_amd64.deb'},
        'linux-x86_64-rpm': {'signature': '', 'url': f'https://github.com/{repo}/releases/download/{tag}/EzProfile-{v}-1.x86_64.rpm'},
        'windows-x86_64': {'signature': '', 'url': f'https://github.com/{repo}/releases/download/{tag}/EzProfile_{v}_x64_en-US.msi'},
        'darwin-x86_64': {'signature': '', 'url': f'https://github.com/{repo}/releases/download/{tag}/EzProfile_{v}_x64.dmg'},
        'darwin-aarch64': {'signature': '', 'url': f'https://github.com/{repo}/releases/download/{tag}/EzProfile_{v}_aarch64.dmg'},
    }
}
with open('$JSON_FILE', 'w') as f:
    json.dump(data, f, indent=2)
"
          fi
          echo "Uploading latest.json..."
          gh release upload "${{ github.ref_name }}" "$JSON_FILE" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
