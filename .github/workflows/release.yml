name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Build on all platforms
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-22.04
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: "ezprofile-dev"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'EzProfile v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false

      # Upload latest.json from Linux build as additional release asset
      - name: Upload latest.json (Linux only)
        if: matrix.platform == 'linux'
        run: |
          JSON_FILE="src-tauri/target/release/bundle/latest.json"
          if [ -f "$JSON_FILE" ]; then
            echo "Found latest.json, uploading..."
            gh release upload "${{ github.ref_name }}" "$JSON_FILE" --clobber
          else
            echo "latest.json not found at $JSON_FILE"
            find src-tauri/target/release -name "latest.json" 2>/dev/null || echo "No latest.json anywhere"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
